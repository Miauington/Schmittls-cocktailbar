<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Schmittl's Cocktailbar</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            background: var(--gradient-primary);
        }

        .login-box {
            max-width: 450px;
            width: 100%;
            background: rgba(31, 31, 58, 0.8);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-xl);
        }

        .login-logo {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .login-logo h1 {
            font-family: var(--font-heading);
            font-size: var(--font-size-3xl);
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
        }

        .login-logo p {
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--radius-md);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: var(--font-size-base);
            transition: all var(--transition-base);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .error-message {
            background: rgba(239, 71, 111, 0.1);
            border: 1px solid var(--color-error);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            color: var(--color-error);
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .back-link {
            text-align: center;
            margin-top: var(--spacing-xl);
        }

        .back-link a {
            color: var(--color-text-muted);
            font-size: var(--font-size-sm);
            transition: color var(--transition-fast);
        }

        .back-link a:hover {
            color: var(--color-accent-gold);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <h1>Schmittl's</h1>
                <p>Admin-Bereich</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Benutzername</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Passwort</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary w-full">Anmelden</button>
            </form>

            <div class="back-link">
                <a href="../index.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-inline"><path d="m15 18-6-6 6-6"/></svg> Zurück zur Website</a>
            </div>

            <div class="login-credentials-box">
                <p class="login-credentials-text">
                    <strong>Standard-Zugangsdaten:</strong><br>
                    Benutzername: <code class="code-badge">admin</code><br>
                    Passwort: <code class="code-badge">schmittls2026</code>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/content-manager.js"></script>
    <script type="module" src="/src/js/auth.js"></script>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            const result = authManager.login(username, password);

            if (result.success) {
                window.location.href = '../dashboard.html';
            } else {
                errorMessage.textContent = result.message;
                errorMessage.classList.add('show');

                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        }

        // Auto-focus username field
        document.getElementById('username').focus();
    </script>
</body>

</html>
